<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body id="labubu">
<header id="cabecalho">
    <a href="https://www.instagram.com/etecoteca/?g=5" target="_blank">
    <img src="assets/logo.png" id="homelogo">
    </a>
    <nav class="navbar container-fluid d-flex align-items-center justify-content-center">
        <form id="formRM" class="container-fluid d-flex justify-content-center gap-3">
            <div class="input-group" style="max-width: 400px; position: relative;">
                <span class="input-group-text">RM:</span>
                <input id="rmInput" maxlength="5" type="text" class="form-control" placeholder="Digite o RM" autocomplete="off">
                <div id="sugestoes" class="list-group"></div>
            </div>
            <button type="submit" class="btn-padrao">Buscar</button>
        </form>
    </nav>
    <img src="assets/logo_cps_versao_cor.png" id="cpslogo">
</header>
<div id="quadrado">

    <div id="areaBusca"></div>

    <div id="registroLivro" style="text-align:center; display:block;">
        <h2>📚 Registrar Livro</h2>
        <input id="codigoLivro" maxlength="13" class="form-control mb-2" placeholder="Escaneie o código de barras">
        <input id="rmLeitor" maxlength="5" class="form-control mb-2" placeholder="RM do aluno">
        <button id="btnRegistrarLivro" class="btn-padrao">Registrar Empréstimo</button>
        <div id="resultadoRegistro"></div>
        <button onclick="voltarInicio()" class="btn-padrao">🔄 Voltar</button>
    </div>
</div>
<footer id="pe">
    <div id="pezinho">
        <p>Feito por: <strong>Equipe 8</strong></p>
    </div>
</footer>
</body>
</html>
